version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/contract_system
      - CORS_ORIGIN=http://localhost:5173
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

volumes:
  mongo_data:
